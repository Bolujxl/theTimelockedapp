<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Time-Locked Letters">
  <title>Time-Locked Letters</title>

  <!-- Folded paper -->
  <rect x="6" y="4" width="20" height="24" rx="3" fill="#FBF6EE" stroke="#B45309" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Fold line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#B45309" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

  <!-- Feather pen, simplified for tiny size: solid amber, no inner barbs -->
  <g transform="translate(16, 19) rotate(30)">
    <path d="M 0 0 Q -1.2 -5 0 -11 Q 1.2 -12.5 2.4 -11 Q 3.6 -5 2.4 0 Q 1.2 1.5 0 0 Z" fill="#B45309"/>
    <path d="M 1.2 -11 L 1.2 5" stroke="#B45309" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
